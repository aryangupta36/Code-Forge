<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - CodeForge</title>
<link rel="stylesheet" href="signin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
<div class="logo"><a href="index.html">⚡ CodeForge</a></div>

<div class="nav-right">
<a href="signin.html" class="login">Login</a>
<a href="signin.html" class="signup">Sign Up</a>
</div>
</header>

<section class="page">

<div class="card">

<h1>Get Started</h1>
<p class="sub">Create your CodeForge account</p>

<div class="divider"><span>OR CONTINUE WITH</span></div>

<button class="google-btn">
<img src="https://www.svgrepo.com/show/475656/google-color.svg">
Continue with Google
</button>

<div class="divider"><span>Or continue with email</span></div>

<label>Username</label>
<input type="text">

<label>Email Address</label>
<input type="email">

<label>Password</label>
<input type="password">

<label>Confirm Password</label>
<input type="password">

<input class="referral" type="text" placeholder="Enter referral code (optional)">

<div class="captcha">
I'm not a robot
</div>

<button class="signup-btn">Create Account</button>

<p class="bottom">
Already have an account?
<a href="signin.html">Sign In</a>
</p>

</div>

</section>

</body>
</html>
